events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS — re-resolve every 5s so nginx
    # picks up new/restarted app containers automatically
    resolver 127.0.0.11 valid=5s ipv6=off;

    # JSON access log for structured log aggregation (Loki/Promtail)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json_combined;

    server {
        listen 80;

        location / {
            set $app app:3000;
            proxy_pass http://$app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Shows which upstream instance handled the request
            add_header X-Upstream-Addr $upstream_addr always;
            add_header Access-Control-Expose-Headers "X-Upstream-Addr, X-Instance-Id" always;
        }

        location /api/health {
            set $app app:3000;
            proxy_pass http://$app;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            add_header X-Upstream-Addr $upstream_addr always;
            add_header Access-Control-Expose-Headers "X-Upstream-Addr, X-Instance-Id" always;
        }

        # Basic nginx stats: active connections, request counts
        location /nginx_status {
            stub_status on;
        }
    }
}
