# Telegraf Configuration for RaumVote

[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  hostname = ""
  omit_hostname = false

# ── Output: InfluxDB v2 ──

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"

# ── Input: Docker container stats ──

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  timeout = "5s"
  perdevice = true
  total = true
  total_include = ["cpu", "blkio", "network"]
  docker_label_include = [
    "com.docker.compose.service",
    "com.docker.compose.project",
  ]

# ── Input: Nginx stub_status ──

[[inputs.nginx]]
  urls = ["http://nginx/nginx_status"]
  response_timeout = "5s"

# ── Input: App health probe (latency + availability) ──

[[inputs.http_response]]
  urls = ["http://nginx/api/health"]
  response_timeout = "10s"
  method = "GET"
  response_string_match = "\"ok\":true"
  [inputs.http_response.tags]
    endpoint = "health"

# ── Input: App metrics (queue depth, image pipeline, session stats) ──

[[inputs.http]]
  urls = ["http://nginx/api/metrics"]
  method = "GET"
  timeout = "10s"
  data_format = "json"
  name_override = "app_metrics"
  tag_keys = ["instance"]

# ── Input: Telegraf internal metrics ──

[[inputs.internal]]
  collect_memstats = true
