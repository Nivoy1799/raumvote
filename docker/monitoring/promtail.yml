server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
    pipeline_stages:
      # ── Nginx: parse JSON access logs, extract labels, drop health polls ──
      - match:
          selector: '{service="nginx"}'
          stages:
            - json:
                expressions:
                  request_method: request_method
                  request_uri: request_uri
                  status: status
            - labels:
                status:
                request_method:
            - drop:
                source: "request_uri"
                expression: "^/(api/health|api/metrics|nginx_status)"
      # ── App: parse JSON request logs, extract labels ──
      - match:
          selector: '{service="app"}'
          stages:
            - json:
                expressions:
                  method: method
                  path: path
                  status: status
                  duration_ms: duration_ms
            - labels:
                method:
                path:
      # ── Worker: tag log level from structured output ──
      - match:
          selector: '{service="worker"}'
          stages:
            - regex:
                expression: "\\[worker\\] (?P<level>Poll error|error|Started|Stopped|Processed)"
            - labels:
                level:
